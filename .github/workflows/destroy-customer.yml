name: Destroy Customer

on:
  workflow_dispatch:
    inputs:
      customer:
        description: "Customer name to destroy"
        required: true
        type: string
      confirm:
        description: "Type the customer name again to confirm"
        required: true
        type: string

concurrency:
  group: destroy-${{ github.event.inputs.customer || 'none' }}
  cancel-in-progress: false

jobs:
  destroy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Confirm destruction
        run: |
          if [ "${{ inputs.customer }}" != "${{ inputs.confirm }}" ]; then
            echo "::error::Confirmation does not match. You typed '${{ inputs.confirm }}' but expected '${{ inputs.customer }}'"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: deploy/terraform
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          terraform init \
            -backend-config="bucket=vega-tfstate-214057697325" \
            -backend-config="key=${{ inputs.customer }}/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=vega-terraform-locks" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        working-directory: deploy/terraform
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          terraform destroy \
            -var-file="../customers/${{ inputs.customer }}/terraform.tfvars" \
            -var="ssh_public_key=${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}" \
            -auto-approve

      - name: Delete SSM parameters
        run: |
          aws ssm delete-parameter --name "/vega/${{ inputs.customer }}/env" 2>/dev/null || true

      - name: Summary
        run: echo "### Destroyed: ${{ inputs.customer }}" >> $GITHUB_STEP_SUMMARY
